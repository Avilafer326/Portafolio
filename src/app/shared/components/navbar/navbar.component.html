<nav class="fixed top-0 left-0 right-0 z-50 h-20 bg-bg-primary/80 dark:bg-bg-primary-dark/80 backdrop-blur-md border-b border-border dark:border-border-dark transition-all">
  <div class="max-w-content mx-auto px-8 h-full flex items-center justify-between">
    <!-- Logo -->
    <a href="#hero" class="text-text-main dark:text-text-main-dark font-bold text-xl tracking-tight">{{ '{' }}FA{{ '}' }}</a>

    <!-- Links de navegación (desktop) -->
    <div class="hidden md:flex items-center gap-8">
      @for (link of links; track link.href) {
        <a
          [href]="link.href"
          class="text-text-secondary dark:text-text-secondary-dark hover:text-accent-purple transition-colors text-sm font-medium relative group"
        >
          {{ link.label }}
          <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-accent-purple transition-all group-hover:w-full"></span>
        </a>
      }
    </div>

    <!-- Toggle de tema -->
    <app-theme-toggle />
  </div>
</nav>
