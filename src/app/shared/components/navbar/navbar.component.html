<nav class="fixed top-0 left-0 right-0 z-50 h-20 bg-bg-primary/80 backdrop-blur-md border-b border-border transition-all">
  <div class="max-w-content mx-auto px-8 h-full flex items-center justify-between">
    <a href="#hero" class="text-text-main font-bold text-xl tracking-tight">Portfolio</a>
    <div class="hidden md:flex items-center gap-8">
      @for (link of links; track link.href) {
        <a
          [href]="link.href"
          class="text-text-secondary hover:text-accent-purple transition-colors text-sm font-medium relative group"
        >
          {{ link.label }}
          <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-accent-purple transition-all group-hover:w-full"></span>
        </a>
      }
    </div>
    <button
      (click)="toggleTheme()"
      class="p-2 rounded-lg border border-border text-text-secondary hover:text-accent-purple hover:border-accent-purple transition-all"
      aria-label="Toggle theme"
    >
      @if (themeService.theme() === 'dark') {
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      }
    </button>
  </div>
</nav>
