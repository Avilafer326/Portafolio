<section id="contact" class="py-section">
  <div class="max-w-content mx-auto px-8">
    <app-section-title
      title="Contacto"
      subtitle="¿Tienes un proyecto en mente? Hablemos."
    />

    <div class="grid grid-cols-1 lg:grid-cols-5 gap-12">
      <!-- Left: Info -->
      <div class="lg:col-span-2 space-y-6">
        <p class="text-text-secondary dark:text-text-secondary-dark leading-relaxed">
          Estoy disponible para proyectos freelance, colaboraciones y oportunidades laborales.
          No dudes en contactarme.
        </p>
        <div class="space-y-4">
          <div class="flex items-center gap-3 text-text-secondary dark:text-text-secondary-dark">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <a href="mailto:hola@fernandoavila.dev" class="hover:text-accent-purple transition-colors">hola@fernandoavila.dev</a>
          </div>
          <div class="flex items-center gap-3 text-text-secondary dark:text-text-secondary-dark">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            México
          </div>
          <div class="flex items-center gap-3 text-text-secondary dark:text-text-secondary-dark">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            Disponible para proyectos
          </div>
        </div>
        <div class="flex items-center gap-4 pt-2">
          <a href="https://github.com" target="_blank" rel="noopener" class="text-text-muted dark:text-text-muted-dark hover:text-accent-purple transition-colors" aria-label="GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          </a>
          <a href="https://linkedin.com" target="_blank" rel="noopener" class="text-text-muted dark:text-text-muted-dark hover:text-accent-purple transition-colors" aria-label="LinkedIn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          </a>
        </div>
      </div>

      <!-- Right: Form -->
      <div class="lg:col-span-3">
        <form class="space-y-4" onsubmit="return false;">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="name" class="sr-only">Nombre completo</label>
              <input
                id="name"
                type="text"
                placeholder="Nombre completo"
                class="w-full px-4 py-3 rounded-lg border border-border dark:border-border-dark bg-surface dark:bg-surface-dark text-text-main dark:text-text-main-dark placeholder:text-text-muted dark:placeholder:text-text-muted-dark focus:outline-none focus:border-accent-purple transition-colors"
              />
            </div>
            <div>
              <label for="email" class="sr-only">Correo electrónico</label>
              <input
                id="email"
                type="email"
                placeholder="Correo electrónico"
                class="w-full px-4 py-3 rounded-lg border border-border dark:border-border-dark bg-surface dark:bg-surface-dark text-text-main dark:text-text-main-dark placeholder:text-text-muted dark:placeholder:text-text-muted-dark focus:outline-none focus:border-accent-purple transition-colors"
              />
            </div>
          </div>
          <div>
            <label for="subject" class="sr-only">Asunto</label>
            <input
              id="subject"
              type="text"
              placeholder="Asunto"
              class="w-full px-4 py-3 rounded-lg border border-border dark:border-border-dark bg-surface dark:bg-surface-dark text-text-main dark:text-text-main-dark placeholder:text-text-muted dark:placeholder:text-text-muted-dark focus:outline-none focus:border-accent-purple transition-colors"
            />
          </div>
          <div>
            <label for="message" class="sr-only">Mensaje</label>
            <textarea
              id="message"
              rows="5"
              placeholder="Tu mensaje"
              class="w-full px-4 py-3 rounded-lg border border-border dark:border-border-dark bg-surface dark:bg-surface-dark text-text-main dark:text-text-main-dark placeholder:text-text-muted dark:placeholder:text-text-muted-dark focus:outline-none focus:border-accent-purple transition-colors resize-none"
            ></textarea>
          </div>
          <div class="flex justify-end">
            <app-button label="Enviar mensaje" />
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
